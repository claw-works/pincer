name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binary:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o pincer-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pincer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: pincer-${{ matrix.goos }}-${{ matrix.goarch }}

  build-docker:
    name: Build & Push Docker Image
    needs: build-binary
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: pincer-linux-amd64
          path: dist/linux/amd64

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: pincer-linux-arm64
          path: dist/linux/arm64

      - name: Make binaries executable
        run: chmod +x dist/linux/amd64/pincer-linux-amd64 dist/linux/arm64/pincer-linux-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BINARY=dist/linux/amd64/pincer-linux-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BINARY=dist/linux/arm64/pincer-linux-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /orgs/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }} \
            -f visibility=public || true

  release:
    name: Create GitHub Release
    needs: [build-binary, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
